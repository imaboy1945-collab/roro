<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 프롭테크 지도</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-image/leaflet-image.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* ── 단일 블루 톤 팔레트 (채도로 분류) ── */
            --primary:        hsl(222, 82%, 52%);   /* 고채도 – 주요 액션 */
            --primary-hover:  hsl(222, 82%, 43%);
            --primary-mid:    hsl(222, 55%, 62%);   /* 중채도 – 보조 */
            --primary-light:  hsl(222, 60%, 96%);   /* 저채도 – 호버 배경 */
            --primary-border: hsl(222, 38%, 83%);   /* 저채도 – 구분선 */
            --primary-bg:     hsl(222, 22%, 95%);   /* 매우 저채도 – 사이드바 */
            --export-bg:      hsl(222, 48%, 16%);   /* 딥블루 – 내보내기 패널 */
            --export-mid:     hsl(222, 40%, 24%);

            /* 기능 색상 */
            --orange:         #f97316;
            --orange-light:   #fff7ed;
            --orange-border:  #fed7aa;
            --green:          #16a34a;
            --red:            #dc2626;

            --bg:           hsl(222, 18%, 95%);
            --card:         #ffffff;
            --text-main:    #111827;
            --text-sub:     #4b5563;
            --text-caption: #9ca3af;
            --border:       hsl(222, 18%, 88%);
            --shadow-card:  0 1px 4px hsla(222,60%,30%,0.09), 0 0 0 1px hsla(222,40%,50%,0.06);
            --radius:    12px;
            --radius-sm:  8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
            background: var(--bg);
        }

        /* ────────────── 사이드바 ────────────── */
        #sidebar {
            width: 360px; min-width: 360px;
            background: var(--primary-bg);
            z-index: 1000;
            display: flex; flex-direction: column;
            overflow-y: auto;
            transition: transform 0.28s cubic-bezier(.4,0,.2,1), min-width 0.28s;
            position: relative;
        }
        #sidebar.collapsed { transform: translateX(-360px); min-width: 0; }

        #sidebar-toggle {
            position: absolute; top: 50%; right: -18px;
            transform: translateY(-50%);
            width: 18px; height: 52px;
            background: var(--card);
            border: 1px solid var(--border); border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer; z-index: 1001;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 3px 0 8px hsla(222,60%,30%,0.1);
            transition: background 0.15s;
        }
        #sidebar-toggle:hover { background: var(--primary-light); }
        #sidebar-toggle svg { transition: transform 0.28s; }
        #sidebar.collapsed #sidebar-toggle svg { transform: rotate(180deg); }

        #sidebar-inner { flex: 1; overflow-y: auto; padding: 14px 14px 20px; }

        /* ── 로고 ── */
        .logo {
            display: flex; align-items: center; gap: 10px;
            padding: 16px 14px 12px;
            border-bottom: 1px solid var(--primary-border);
            background: var(--card);
        }
        .logo-icon {
            width: 34px; height: 34px; background: var(--primary);
            border-radius: 9px; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .logo-text { font-size: 16px; font-weight: 700; color: var(--text-main); letter-spacing: -0.3px; }
        .logo-sub  { font-size: 11px; color: var(--text-caption); margin-top: 1px; }

        /* ── 공통 카드 ── */
        .panel-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            margin-bottom: 10px; overflow: hidden;
        }
        .panel-header {
            display: flex; align-items: center; gap: 7px;
            padding: 11px 14px 10px;
            border-bottom: 1px solid var(--border);
            background: hsl(222, 20%, 98%);
        }
        .panel-header-icon {
            width: 24px; height: 24px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .panel-header-title { font-size: 13px; font-weight: 700; color: var(--text-main); letter-spacing: -0.2px; }
        .panel-body { padding: 12px 14px; }

        /* 단일 블루 톤 – 채도 4단계 분류 */
        .icon-sat-hi  { background: hsl(222, 82%, 52%); color: #fff; }  /* 고채도 */
        .icon-sat-med { background: hsl(222, 58%, 60%); color: #fff; }  /* 중채도 */
        .icon-sat-lo  { background: hsl(222, 42%, 72%); color: #fff; }  /* 저채도 */
        .icon-sat-vlo { background: hsl(222, 28%, 83%); color: hsl(222,65%,32%); } /* 매우 저채도 */

        /* ── 검색 ── */
        .search-row { display: flex; gap: 7px; }
        .search-row input {
            flex: 1; padding: 9px 12px;
            border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            font-size: 13px; outline: none; font-family: inherit;
            color: var(--text-main); background: var(--primary-bg);
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        .search-row input::placeholder { color: var(--text-caption); }
        .search-row input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px hsla(222,82%,52%,0.13);
            background: #fff;
        }
        .search-row button {
            padding: 9px 13px;
            background: var(--primary); color: white;
            border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 500; cursor: pointer;
            font-family: inherit; white-space: nowrap;
            display: flex; align-items: center; gap: 5px;
            transition: background 0.18s;
        }
        .search-row button:hover { background: var(--primary-hover); }

        #search-results { margin-top: 8px; max-height: 150px; overflow-y: auto; }
        .search-result-item {
            padding: 8px 4px; cursor: pointer;
            border-bottom: 1px solid var(--border); transition: background 0.12s;
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: var(--primary-light); border-radius: 6px; }
        .addr-main { font-size: 13px; font-weight: 500; color: var(--text-main); }
        .addr-sub  { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
        .search-empty { font-size: 12px; color: var(--text-caption); text-align: center; padding: 10px 0; }

        /* ── 마커 ── */
        .marker-mode-row { display: flex; gap: 6px; margin-bottom: 10px; }
        .marker-mode-btn {
            flex: 1; padding: 8px 6px;
            border-radius: var(--radius-sm); border: 1.5px solid var(--border);
            background: var(--primary-bg); color: var(--text-sub);
            font-size: 12px; font-weight: 500; cursor: pointer;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            transition: all 0.18s;
        }
        .marker-mode-btn:hover { background: var(--orange-light); border-color: var(--orange-border); color: var(--orange); }
        .marker-mode-btn.active { background: var(--orange); color: white; border-color: var(--orange); }
        .marker-mode-btn.del-btn { color: var(--red); }
        .marker-mode-btn.del-btn:hover { background: #fef2f2; border-color: #fecaca; }

        .marker-list { max-height: 180px; overflow-y: auto; }
        .marker-item {
            display: flex; align-items: flex-start; gap: 9px;
            padding: 8px 6px; border-radius: var(--radius-sm);
            cursor: pointer; transition: background 0.12s;
        }
        .marker-item:hover { background: var(--primary-bg); }
        .marker-item + .marker-item { border-top: 1px solid var(--border); }
        .marker-item-icon { flex-shrink: 0; display: flex; align-items: center; padding-top: 1px; }
        .marker-item-body { flex: 1; min-width: 0; }
        .marker-item-title { font-size: 13px; font-weight: 500; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .marker-item-memo  { font-size: 11px; color: var(--text-sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .marker-item-del {
            background: none; border: none; color: var(--text-caption);
            cursor: pointer; padding: 3px 4px; border-radius: 4px;
            display: flex; align-items: center;
            transition: all 0.12s; flex-shrink: 0;
        }
        .marker-item-del:hover { background: #fef2f2; color: var(--red); }
        .marker-empty { font-size: 12px; color: var(--text-caption); text-align: center; padding: 14px 0; line-height: 1.6; }

        /* ── 마커 모달 ── */
        #marker-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 9998;
            align-items: center; justify-content: center;
        }
        #marker-modal.active { display: flex; }
        .modal-box {
            background: white; border-radius: 16px;
            padding: 22px 22px 20px; width: 310px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.18);
            animation: popIn 0.18s ease;
        }
        @keyframes popIn { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-title {
            font-size: 15px; font-weight: 700; color: var(--text-main);
            margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
        }
        .modal-label { font-size: 11px; color: var(--text-sub); font-weight: 500; margin-bottom: 5px; margin-top: 12px; letter-spacing: 0.3px; }
        .modal-input, .modal-textarea {
            width: 100%; padding: 9px 11px;
            border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            font-size: 13px; outline: none; font-family: inherit; color: var(--text-main);
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        .modal-textarea { resize: vertical; min-height: 68px; }
        .modal-input:focus, .modal-textarea:focus {
            border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
        }
        .modal-color-row { display: flex; gap: 8px; margin-top: 6px; }
        .color-dot {
            width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: transform 0.15s, box-shadow 0.15s;
        }
        .color-dot:hover { transform: scale(1.15); }
        .color-dot.selected { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #374151; }
        .modal-btn-row { display: flex; gap: 8px; margin-top: 18px; }
        .modal-btn {
            flex: 1; padding: 10px; border-radius: var(--radius-sm); border: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.18s;
        }
        .modal-btn-cancel { background: var(--primary-bg); color: var(--text-sub); }
        .modal-btn-cancel:hover { background: var(--border); }
        .modal-btn-save { background: var(--orange); color: white; }
        .modal-btn-save:hover { background: #ea6c0a; }

        /* ── 측정 ── */
        .measure-btn-row { display: flex; gap: 6px; margin-bottom: 9px; }
        .measure-btn {
            flex: 1; padding: 8px 6px;
            border-radius: var(--radius-sm); border: 1.5px solid var(--border);
            background: var(--primary-bg); color: var(--text-sub);
            font-size: 12px; font-weight: 500; cursor: pointer;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 4px;
            transition: all 0.18s;
        }
        .measure-btn:hover { background: var(--primary-light); border-color: var(--primary-border); color: var(--primary); }
        .measure-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .measure-btn.clear-btn { color: var(--red); }
        .measure-btn.clear-btn:hover { background: #fef2f2; border-color: #fecaca; }
        .measure-result {
            background: var(--primary-light); border: 1px solid var(--primary-border);
            border-radius: var(--radius-sm); padding: 9px 11px;
            font-size: 12px; color: var(--text-main); line-height: 1.7; display: none;
        }
        .measure-result.visible { display: block; }
        .measure-result b { color: var(--primary); font-size: 13px; }
        .measure-hint-text {
            font-size: 11px; color: var(--text-sub); margin-top: 7px; line-height: 1.5;
            padding: 6px 9px; background: var(--primary-bg);
            border-radius: 6px; border-left: 3px solid var(--primary-border);
        }

        /* ── 공유 ── */
        .share-btn-row { display: flex; gap: 7px; }
        .share-btn {
            flex: 1; padding: 9px 6px;
            border-radius: var(--radius-sm); border: none;
            font-size: 12px; font-weight: 600; cursor: pointer;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            transition: all 0.18s;
        }
        .share-btn-copy { background: var(--primary); color: white; }
        .share-btn-copy:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .share-btn-kakao { background: #fee500; color: #3c1e1e; }
        .share-btn-kakao:hover { background: #fada00; transform: translateY(-1px); }
        .share-toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: #1f2937; color: white; padding: 11px 20px;
            border-radius: 24px; font-size: 13px; font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.22); z-index: 9997;
            opacity: 0; pointer-events: none; font-family: inherit;
            transition: opacity 0.25s, transform 0.25s;
        }
        .share-toast.visible { opacity: 1; transform: translateX(-50%) translateY(-6px); }

        /* ── 내보내기 패널 (딥블루) ── */
        .export-panel {
            background: var(--export-bg);
            border-radius: var(--radius);
            padding: 15px; margin-bottom: 10px; color: white;
            box-shadow: var(--shadow-card);
        }
        .export-panel-title {
            font-size: 13px; font-weight: 700; margin-bottom: 12px;
            display: flex; align-items: center; gap: 7px;
            color: rgba(255,255,255,0.92); letter-spacing: -0.2px;
        }
        .export-tabs { display: flex; gap: 4px; margin-bottom: 13px; background: rgba(255,255,255,0.06); border-radius: 8px; padding: 3px; }
        .etab {
            flex: 1; padding: 7px 4px; border-radius: 6px;
            border: none; background: transparent;
            color: rgba(255,255,255,0.55); font-size: 11px; font-weight: 600;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 4px;
            transition: all 0.18s;
        }
        .etab:hover { color: rgba(255,255,255,0.8); }
        .etab.active { background: var(--primary); color: white; box-shadow: 0 1px 4px rgba(37,99,235,0.4); }

        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .form-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .form-row label { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; min-width: 56px; font-weight: 500; }
        .form-row select {
            flex: 1; padding: 7px 8px;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
            background: rgba(255,255,255,0.08); color: white;
            font-size: 12px; outline: none; font-family: inherit;
            transition: border-color 0.18s;
        }
        .form-row select:focus { border-color: rgba(255,255,255,0.35); }
        .form-row select option { background: hsl(222,48%,18%); }

        .status-bar { font-size: 11px; color: rgba(255,255,255,0.45); margin: 7px 0; min-height: 14px; line-height: 1.5; }
        .status-bar.ok   { color: #4ade80; }
        .status-bar.err  { color: #f87171; }
        .status-bar.warn { color: #fbbf24; }

        .tile-preview {
            background: rgba(0,0,0,0.2); border-radius: 6px;
            padding: 8px 10px; margin-bottom: 9px; font-size: 11px;
            color: rgba(255,255,255,0.6); line-height: 1.8; display: none;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .tile-preview.visible { display: block; }
        .tile-preview b { color: #4ade80; font-size: 12px; }

        .btn-row { display: flex; gap: 7px; }
        .btn-main {
            flex: 1; padding: 10px 7px; border-radius: var(--radius-sm); border: none;
            font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            transition: all 0.18s;
        }
        .btn-main:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-main:disabled { filter: none; transform: none; opacity: 0.45; cursor: not-allowed; }
        .btn-green  { background: linear-gradient(135deg, #16a34a, #22c55e); color: white; }
        .btn-orange { background: linear-gradient(135deg, #ea580c, #f97316); color: white; }
        .btn-ghost  { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2) !important; color: rgba(255,255,255,0.85); }

        /* ── 로딩 오버레이 ── */
        #capture-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.72); z-index: 9999;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 14px; color: white;
        }
        #capture-overlay.active { display: flex; }
        .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #overlay-msg { font-size: 15px; font-weight: 700; }
        #overlay-sub { font-size: 12px; color: rgba(255,255,255,0.55); }
        #overlay-prog { width: 240px; height: 6px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
        #overlay-prog-bar { height: 100%; background: var(--primary); border-radius: 4px; width: 0%; transition: width 0.15s; }

        #map { flex: 1; height: 100%; }
        #map.selecting-mode     { cursor: crosshair !important; }
        #map.marker-adding-mode { cursor: cell !important; }
        #map.measuring-mode     { cursor: crosshair !important; }

        #marker-hint {
            display: none; position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            background: var(--orange); color: white; padding: 8px 18px;
            border-radius: 20px; font-size: 13px; font-weight: 600;
            z-index: 5000; box-shadow: 0 4px 14px rgba(0,0,0,0.2);
            pointer-events: none; font-family: inherit;
            align-items: center; gap: 7px;
        }
        #marker-hint.visible { display: flex; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary-border); border-radius: 4px; }
    </style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div id="capture-overlay">
    <div class="spinner"></div>
    <div id="overlay-msg">타일을 불러오는 중...</div>
    <div id="overlay-sub"></div>
    <div id="overlay-prog"><div id="overlay-prog-bar"></div></div>
</div>

<!-- 마커 추가 힌트 -->
<div id="marker-hint">
    <svg width="11" height="14" viewBox="0 0 22 28" fill="white"><path d="M11 0C5.477 0 1 4.477 1 10c0 8.5 10 18 10 18S21 18.5 21 10C21 4.477 16.523 0 11 0z"/><circle cx="11" cy="10" r="4" fill="rgba(255,255,255,0.35)"/></svg>
    지도를 클릭해서 핀을 꽂으세요 &nbsp;|&nbsp; ESC 취소
</div>

<!-- 공유 토스트 -->
<div class="share-toast" id="share-toast"></div>

<!-- 마커 메모 모달 -->
<div id="marker-modal">
    <div class="modal-box">
        <div class="modal-title">
            <svg width="15" height="19" viewBox="0 0 22 28" fill="#f97316"><path d="M11 0C5.477 0 1 4.477 1 10c0 8.5 10 18 10 18S21 18.5 21 10C21 4.477 16.523 0 11 0z"/><circle cx="11" cy="10" r="4" fill="white" opacity="0.88"/></svg>
            핀 메모 추가
        </div>
        <div class="modal-label">제목</div>
        <input class="modal-input" id="m-title" type="text" placeholder="예) 관심 매물, 투자 후보지" maxlength="40" />
        <div class="modal-label">메모</div>
        <textarea class="modal-textarea" id="m-memo" placeholder="가격, 면적, 특이사항 등 자유롭게 입력"></textarea>
        <div class="modal-label">색상</div>
        <div class="modal-color-row">
            <div class="color-dot selected" style="background:#e74c3c" data-color="#e74c3c" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background:#e67e22" data-color="#e67e22" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background:#2ecc71" data-color="#2ecc71" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background:#3498db" data-color="#3498db" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background:#9b59b6" data-color="#9b59b6" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background:#1a252f" data-color="#1a252f" onclick="selectColor(this)"></div>
        </div>
        <div class="modal-btn-row">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal()">취소</button>
            <button class="modal-btn modal-btn-save" onclick="saveMarker()">저장</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <!-- 토글 버튼 -->
    <button id="sidebar-toggle" onclick="toggleSidebar()" title="패널 열기/닫기">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none">

<script>
// ─────────────────────────────────────
// SVG 핀 생성 헬퍼
// ─────────────────────────────────────
function makePinSvg(color, w, h) {
    w = w || 28; h = h || 36;
    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.32))">'
        + '<path d="M14 1C8.477 1 4 5.477 4 11C4 19.5 14 35 14 35C14 35 24 19.5 24 11C24 5.477 19.523 1 14 1Z" fill="'+color+'" stroke="white" stroke-width="1.5"/>'
        + '<circle cx="14" cy="11" r="5" fill="white" opacity="0.9"/>'
        + '</svg>';
}

function makePinSvgSmall(color) {
    return makePinSvg(color, 16, 21);
}

// ─────────────────────────────────────
// 0. 사이드바 토글
// ─────────────────────────────────────
function toggleSidebar(){
    var sb = document.getElementById('sidebar');
    sb.classList.toggle('collapsed');
    map.invalidateSize();
}

// ─────────────────────────────────────
// 1. 지도 초기화
// ─────────────────────────────────────
var vworldBase      = L.tileLayer('https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',       {maxZoom:19,attribution:'&copy; V-World'});
var vworldSatellite = L.tileLayer('https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg', {maxZoom:19,attribution:'&copy; V-World'});
var vworldHybrid    = L.tileLayer('https://xdworld.vworld.kr/2d/Hybrid/service/{z}/{x}/{y}.png',     {maxZoom:19,attribution:'&copy; V-World'});

var map = L.map('map',{zoomControl:false,maxZoom:19,layers:[vworldSatellite],doubleClickZoom:false}).setView([37.5263,126.8962],16);
L.control.zoom({position:'bottomright'}).addTo(map);
L.control.layers({'일반지도':vworldBase,'위성지도':vworldSatellite},{'하이브리드':vworldHybrid},{position:'topright'}).addTo(map);
map.on('moveend zoomend', calcTilePreview);

// ─────────────────────────────────────
// 2. 탭 전환
// ─────────────────────────────────────
function switchTab(t){
    document.querySelectorAll('.etab').forEach(function(el,i){el.classList.toggle('active',(i===0&&t==='quick')||(i===1&&t==='large'));});
    document.getElementById('tab-quick').classList.toggle('active',t==='quick');
    document.getElementById('tab-large').classList.toggle('active',t==='large');
    if(t==='large') calcTilePreview();
}

// ─────────────────────────────────────
// 3. 주소 검색 (Nominatim)
// ─────────────────────────────────────
var searchMarker = null;

async function searchAddress(){
    var q = document.getElementById('search-input').value.trim();
    if(!q) return;
    var resultsEl = document.getElementById('search-results');
    resultsEl.innerHTML = '<div class="search-empty">검색 중...</div>';

    try {
        var url = 'https://nominatim.openstreetmap.org/search?format=json&q='
            + encodeURIComponent(q)
            + '&countrycodes=kr&limit=5&accept-language=ko';
        var res = await fetch(url, {headers:{'Accept-Language':'ko'}});
        var data = await res.json();

        if(!data.length){
            resultsEl.innerHTML = '<div class="search-empty">검색 결과가 없습니다.</div>';
            return;
        }

        resultsEl.innerHTML = '';
        data.forEach(function(item){
            var parts = item.display_name.split(',');
            var main = parts[0].trim();
            var sub  = parts.slice(1,4).join(',').trim();
            var div = document.createElement('div');
            div.className = 'search-result-item';
            div.innerHTML = '<div class="addr-main">'+main+'</div>'
                          + '<div class="addr-sub">'+sub+'</div>';
            div.onclick = function(){
                var lat = parseFloat(item.lat);
                var lng = parseFloat(item.lon);
                map.setView([lat,lng], 17);
                if(searchMarker) map.removeLayer(searchMarker);
                searchMarker = L.marker([lat,lng], {
                    icon: L.divIcon({
                        html: makePinSvg('#2563eb', 30, 38),
                        className:'', iconSize:[30,38], iconAnchor:[15,38]
                    })
                }).addTo(map).bindPopup('<b>'+main+'</b><br><small>'+sub+'</small>').openPopup();
                resultsEl.innerHTML = '';
            };
            resultsEl.appendChild(div);
        });
    } catch(e) {
        resultsEl.innerHTML = '<div class="search-empty">검색 오류가 발생했습니다.</div>';
    }
}

// ─────────────────────────────────────
// 4. 마커 메모
// ─────────────────────────────────────
var markers = [];
var pendingLatLng = null;
var selectedColor = '#e74c3c';
var isMarkerMode = false;

var SVG_PLUS  = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>';
var SVG_CLOSE = '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>';
var SVG_TRASH_SM = '<svg width="11" height="12" viewBox="0 0 12 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3.5h10"/><path d="M4 3.5V2a.5.5 0 01.5-.5h3a.5.5 0 01.5.5v1.5"/><path d="M2 3.5l.8 9a.5.5 0 00.5.5h5.4a.5.5 0 00.5-.5l.8-9"/></svg>';

function toggleMarkerMode(){
    if(measureMode) stopMeasure();
    isMarkerMode = !isMarkerMode;
    var btn = document.getElementById('btn-add-marker');
    var hint = document.getElementById('marker-hint');
    var mapEl = document.getElementById('map');

    if(isMarkerMode){
        btn.classList.add('active');
        btn.innerHTML = SVG_CLOSE + ' 취소';
        hint.classList.add('visible');
        mapEl.classList.add('marker-adding-mode');
    } else {
        btn.classList.remove('active');
        btn.innerHTML = SVG_PLUS + ' 핀 추가';
        hint.classList.remove('visible');
        mapEl.classList.remove('marker-adding-mode');
    }
}

document.addEventListener('keydown', function(e){
    if(e.key === 'Escape'){
        if(isMarkerMode) toggleMarkerMode();
        if(measureMode) clearMeasure();
        closeModal();
    }
});

map.on('click', function(e){
    if(!isMarkerMode) return;
    pendingLatLng = e.latlng;
    document.getElementById('m-title').value = '';
    document.getElementById('m-memo').value = '';
    document.querySelectorAll('.color-dot').forEach(function(d){ d.classList.remove('selected'); });
    document.querySelector('.color-dot[data-color="#e74c3c"]').classList.add('selected');
    selectedColor = '#e74c3c';
    document.getElementById('marker-modal').classList.add('active');
    setTimeout(function(){ document.getElementById('m-title').focus(); }, 100);
    toggleMarkerMode();
});

function selectColor(el){
    document.querySelectorAll('.color-dot').forEach(function(d){ d.classList.remove('selected'); });
    el.classList.add('selected');
    selectedColor = el.dataset.color;
}

function closeModal(){
    document.getElementById('marker-modal').classList.remove('active');
    pendingLatLng = null;
}

function saveMarker(){
    if(!pendingLatLng) return;
    var title = document.getElementById('m-title').value.trim() || '관심 지역';
    var memo  = document.getElementById('m-memo').value.trim();
    var color = selectedColor;
    var id    = Date.now();

    var leafletMarker = L.marker(pendingLatLng, {
        icon: L.divIcon({
            html: makePinSvg(color, 30, 38),
            className:'', iconSize:[30,38], iconAnchor:[15,38]
        })
    }).addTo(map);

    var popupHtml = '<div style="min-width:160px">'
        + '<b style="font-size:13px;color:'+color+'">'+title+'</b>'
        + (memo ? '<p style="font-size:12px;margin:6px 0 0;color:#555">'+memo+'</p>' : '')
        + '<p style="font-size:10px;margin:6px 0 0;color:#aaa">'
        + pendingLatLng.lat.toFixed(6)+', '+pendingLatLng.lng.toFixed(6)+'</p>'
        + '</div>';
    leafletMarker.bindPopup(popupHtml);

    markers.push({ id:id, title:title, memo:memo, color:color, latlng:pendingLatLng, leafletMarker:leafletMarker });
    closeModal();
    renderMarkerList();
}

function renderMarkerList(){
    var listEl = document.getElementById('marker-list');
    if(!markers.length){
        listEl.innerHTML = '<div class="marker-empty">핀이 없습니다.<br>지도를 클릭해 관심지역을 표시하세요.</div>';
        return;
    }
    listEl.innerHTML = '';
    markers.forEach(function(m){
        var div = document.createElement('div');
        div.className = 'marker-item';
        div.innerHTML = '<div class="marker-item-icon">'+makePinSvgSmall(m.color)+'</div>'
            + '<div class="marker-item-body">'
            + '<div class="marker-item-title">'+m.title+'</div>'
            + '<div class="marker-item-memo">'+(m.memo||'메모 없음')+'</div>'
            + '</div>'
            + '<button class="marker-item-del" title="삭제" onclick="event.stopPropagation();deleteMarker('+m.id+')">'+SVG_TRASH_SM+'</button>';
        div.onclick = function(){
            map.setView(m.latlng, Math.max(map.getZoom(), 17));
            m.leafletMarker.openPopup();
        };
        listEl.appendChild(div);
    });
}

function deleteMarker(id){
    var idx = markers.findIndex(function(m){ return m.id === id; });
    if(idx === -1) return;
    map.removeLayer(markers[idx].leafletMarker);
    markers.splice(idx, 1);
    renderMarkerList();
}

function clearAllMarkers(){
    if(!markers.length) return;
    if(!confirm('모든 핀('+markers.length+'개)을 삭제하시겠습니까?')) return;
    markers.forEach(function(m){ map.removeLayer(m.leafletMarker); });
    markers = [];
    renderMarkerList();
}

// ─────────────────────────────────────
// 5. 영역 선택
// ─────────────────────────────────────
var selRect=null, selBounds=null, isSelecting=false, selStart=null;

var SVG_PENCIL = '<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2l2.5 2.5-8 8H1.5v-2.5L9.5 2z"/></svg>';

function startAreaSelect(forLarge){
    if(isSelecting) return;
    isSelecting=true; selBounds=null;
    if(selRect){map.removeLayer(selRect);selRect=null;}
    var btnId=forLarge?'btn-area-sel2':'btn-area-sel';
    document.getElementById(btnId).innerHTML = SVG_PENCIL + ' 취소';
    document.getElementById('map').classList.add('selecting-mode');
    map.dragging.disable();

    map.once('mousedown',function(e){
        selStart=e.latlng;
        function onMove(e2){
            var b=L.latLngBounds(selStart,e2.latlng);
            if(selRect) map.removeLayer(selRect);
            selRect=L.rectangle(b,{color:'#e74c3c',weight:2,fillColor:'#e74c3c',fillOpacity:0.12,dashArray:'6 4'}).addTo(map);
        }
        function onUp(e2){
            map.off('mousemove',onMove); map.off('mouseup',onUp);
            selBounds=L.latLngBounds(selStart,e2.latlng);
            isSelecting=false; map.dragging.enable();
            document.getElementById('map').classList.remove('selecting-mode');
            document.getElementById(btnId).innerHTML = SVG_PENCIL + (forLarge?' 다시 그리기':' 영역 선택');
            if(forLarge) document.getElementById('l-area-mode').value='selection';
            setStatus(forLarge?'large':'quick','영역 선택 완료. 저장을 누르세요.','ok');
            calcTilePreview();
        }
        map.on('mousemove',onMove); map.on('mouseup',onUp);
    });
}

function setStatus(tab,msg,cls){
    var el=document.getElementById(tab==='large'?'large-status':'quick-status');
    el.textContent=msg; el.className='status-bar '+(cls||'');
}

// ─────────────────────────────────────
// 6. 좌표 <-> 타일 변환
// ─────────────────────────────────────
function lngLatToTile(lng,lat,z){
    var n=Math.pow(2,z);
    var x=Math.floor((lng+180)/360*n);
    var lr=lat*Math.PI/180;
    var y=Math.floor((1-Math.log(Math.tan(lr)+1/Math.cos(lr))/Math.PI)/2*n);
    return {x:x,y:y};
}

function getExportBounds(){
    if(document.getElementById('l-area-mode').value==='selection'&&selBounds) return selBounds;
    return map.getBounds();
}

function calcTilePreview(){
    var z=parseInt(document.getElementById('l-zoom').value);
    var bounds=getExportBounds();
    var sw=bounds.getSouthWest(), ne=bounds.getNorthEast();
    var nwT=lngLatToTile(sw.lng,ne.lat,z);
    var seT=lngLatToTile(ne.lng,sw.lat,z);
    var tW=seT.x-nwT.x+1, tH=seT.y-nwT.y+1, total=tW*tH;
    var pxW=tW*256, pxH=tH*256;

    document.getElementById('tile-preview').classList.add('visible');
    document.getElementById('prev-tiles').textContent=total.toLocaleString()+'개 ('+tW+'×'+tH+')';
    document.getElementById('prev-res').textContent=pxW.toLocaleString()+' × '+pxH.toLocaleString()+' px';
    document.getElementById('prev-time').textContent=total<50?'~5초':total<200?'~10~30초':total<500?'~1~2분':'2분 이상 (줌 낮추기 권장)';

    if(total>600) setStatus('large','타일 '+total+'개 — 줌레벨을 낮추거나 영역을 선택하세요.','warn');
    else setStatus('large','준비 완료 — Z'+z+' / 타일 '+total+'개 / '+pxW.toLocaleString()+'×'+pxH.toLocaleString()+'px','ok');
}

// ─────────────────────────────────────
// 7. 빠른 저장
// ─────────────────────────────────────
function quickSave(){
    var scale=parseInt(document.getElementById('q-scale').value);
    var fmt=document.getElementById('q-format').value;
    var mime=fmt==='jpeg'?'image/jpeg':'image/png';
    showOverlay('현재 화면 캡처 중...','');
    if(selRect) selRect.setStyle({opacity:0,fillOpacity:0});

    leafletImage(map,function(err,canvas){
        if(selRect) selRect.setStyle({opacity:1,fillOpacity:0.12});
        hideOverlay();
        if(err){setStatus('quick','캡처 실패: '+err,'err');return;}
        var out=document.createElement('canvas');
        if(selBounds){
            var ms=map.getSize();
            var sw2=map.latLngToContainerPoint(selBounds.getSouthWest());
            var ne2=map.latLngToContainerPoint(selBounds.getNorthEast());
            var x=Math.min(sw2.x,ne2.x),y=Math.min(sw2.y,ne2.y);
            var w=Math.abs(ne2.x-sw2.x),h=Math.abs(ne2.y-sw2.y);
            var sc=canvas.width/ms.x;
            out.width=w*sc*scale; out.height=h*sc*scale;
            var ctx=out.getContext('2d');
            if(fmt==='jpeg'){ctx.fillStyle='#fff';ctx.fillRect(0,0,out.width,out.height);}
            ctx.drawImage(canvas,x*sc,y*sc,w*sc,h*sc,0,0,out.width,out.height);
        } else {
            out.width=canvas.width*scale; out.height=canvas.height*scale;
            var ctx=out.getContext('2d');
            if(fmt==='jpeg'){ctx.fillStyle='#fff';ctx.fillRect(0,0,out.width,out.height);}
            ctx.drawImage(canvas,0,0,out.width,out.height);
        }
        downloadCanvas(out,'PropMap_Quick_'+scale+'x',fmt,mime);
        setStatus('quick','저장 완료 ('+out.width+'×'+out.height+'px)','ok');
    });
}

// ─────────────────────────────────────
// 8. 고해상도 타일 스티칭
// ─────────────────────────────────────
async function largeSave(){
    var z=parseInt(document.getElementById('l-zoom').value);
    var tileType=document.getElementById('l-tiletype').value;
    var bounds=getExportBounds();
    var sw=bounds.getSouthWest(), ne=bounds.getNorthEast();
    var nwT=lngLatToTile(sw.lng,ne.lat,z);
    var seT=lngLatToTile(ne.lng,sw.lat,z);
    var tW=seT.x-nwT.x+1, tH=seT.y-nwT.y+1, total=tW*tH;

    if(total>1500){
        alert('타일이 너무 많습니다 ('+total+'개).\n줌레벨을 낮추거나 영역을 선택 후 다시 시도하세요.');
        return;
    }

    var extMap={'Base':'png','Satellite':'jpeg','Hybrid':'png'};
    var ext=extMap[tileType];
    var urlTpl='https://xdworld.vworld.kr/2d/'+tileType+'/service/{z}/{x}/{y}.'+ext;
    var canvasW=tW*256, canvasH=tH*256;
    var offscreen=document.createElement('canvas');
    offscreen.width=canvasW; offscreen.height=canvasH;
    var ctx=offscreen.getContext('2d');

    showOverlay('타일 이미지를 불러오는 중...','0 / '+total);

    var loaded=0, failed=0;

    function loadTile(tx,ty){
        return new Promise(function(resolve){
            var url=urlTpl.replace('{z}',z).replace('{x}',tx).replace('{y}',ty);
            var img=new Image();
            img.crossOrigin='anonymous';
            img.onload=function(){
                var px=(tx-nwT.x)*256, py=(ty-nwT.y)*256;
                ctx.drawImage(img,px,py,256,256);
                loaded++; updateProgress(loaded,total); resolve();
            };
            img.onerror=function(){
                var px=(tx-nwT.x)*256, py=(ty-nwT.y)*256;
                ctx.fillStyle='#cccccc'; ctx.fillRect(px,py,256,256);
                ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.font='12px sans-serif';
                ctx.fillText('×',px+122,py+134);
                loaded++; failed++; updateProgress(loaded,total); resolve();
            };
            img.src=url;
        });
    }

    var allTiles=[];
    for(var ty=nwT.y;ty<=seT.y;ty++)
        for(var tx=nwT.x;tx<=seT.x;tx++)
            allTiles.push([tx,ty]);

    var BATCH=6;
    for(var i=0;i<allTiles.length;i+=BATCH){
        var batch=allTiles.slice(i,i+BATCH).map(function(t){return loadTile(t[0],t[1]);});
        await Promise.all(batch);
    }

    hideOverlay();

    if(failed===total){
        setStatus('large','모든 타일 로드 실패 — CORS 해제 후 재시도 필요','err');
        alert('타일을 불러올 수 없습니다.\n\n【해결 방법】\n크롬을 CORS 해제 모드(--disable-web-security)로 실행해 주세요.');
        return;
    }

    var suffix=failed>0?' (타일 '+failed+'개 누락)':'';
    downloadCanvas(offscreen,'PropMap_Z'+z+'_'+canvasW+'x'+canvasH,ext==='jpeg'?'jpeg':'png',ext==='jpeg'?'image/jpeg':'image/png');
    setStatus('large','저장 완료 — '+canvasW.toLocaleString()+'×'+canvasH.toLocaleString()+'px'+suffix,'ok');
}

// ─────────────────────────────────────
// 8.5 거리·면적 측정
// ─────────────────────────────────────
var measureMode = null;
var measurePoints = [];
var measureMarkers = [];
var measureLine = null;
var measureLabel = null;

function toggleMeasure(mode){
    if(isMarkerMode) toggleMarkerMode();
    if(isSelecting) return;
    if(measureMode === mode){ stopMeasure(); return; }
    clearMeasure();
    measureMode = mode;
    document.getElementById('btn-measure-distance').classList.toggle('active', mode==='distance');
    document.getElementById('btn-measure-area').classList.toggle('active', mode==='area');
    document.getElementById('map').classList.add('measuring-mode');
    var hint = document.getElementById('measure-hint-text');
    hint.style.display = 'block';
    hint.innerHTML = mode==='distance'
        ? '지도를 차례로 클릭해 거리를 측정하세요.<br>마지막 점을 더블클릭하면 종료됩니다.'
        : '면적을 잴 영역의 꼭짓점을 클릭하세요.<br>마지막 점을 더블클릭하면 자동으로 닫힙니다.';
}

function stopMeasure(){
    measureMode = null;
    document.getElementById('btn-measure-distance').classList.remove('active');
    document.getElementById('btn-measure-area').classList.remove('active');
    document.getElementById('map').classList.remove('measuring-mode');
    document.getElementById('measure-hint-text').style.display = 'none';
}

function clearMeasure(){
    measurePoints = [];
    measureMarkers.forEach(function(m){ map.removeLayer(m); });
    measureMarkers = [];
    if(measureLine){ map.removeLayer(measureLine); measureLine = null; }
    if(measureLabel){ map.removeLayer(measureLabel); measureLabel = null; }
    document.getElementById('measure-result').classList.remove('visible');
    document.getElementById('measure-result').textContent = '';
    stopMeasure();
}

function haversine(a, b){
    var R = 6371000;
    var dLat = (b.lat-a.lat)*Math.PI/180;
    var dLng = (b.lng-a.lng)*Math.PI/180;
    var s1 = Math.sin(dLat/2);
    var s2 = Math.sin(dLng/2);
    var x = s1*s1 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*s2*s2;
    return 2*R*Math.asin(Math.sqrt(x));
}

function polygonArea(latlngs){
    if(latlngs.length < 3) return 0;
    var R = 6371000;
    var total = 0;
    for(var i=0;i<latlngs.length;i++){
        var p1 = latlngs[i];
        var p2 = latlngs[(i+1)%latlngs.length];
        total += (p2.lng - p1.lng)*Math.PI/180
               * (2 + Math.sin(p1.lat*Math.PI/180) + Math.sin(p2.lat*Math.PI/180));
    }
    return Math.abs(total * R * R / 2);
}

function fmtDistance(m){
    if(m < 1000) return m.toFixed(1) + ' m';
    return (m/1000).toFixed(3) + ' km';
}
function fmtArea(sqm){ return sqm.toFixed(1) + ' ㎡'; }

function updateMeasureDisplay(){
    var resEl = document.getElementById('measure-result');
    if(!measurePoints.length){ resEl.classList.remove('visible'); return; }
    resEl.classList.add('visible');

    if(measureMode === 'distance' || (measureMode === null && measureLine instanceof L.Polyline && !(measureLine instanceof L.Polygon))){
        var total = 0;
        for(var i=1;i<measurePoints.length;i++) total += haversine(measurePoints[i-1], measurePoints[i]);
        resEl.innerHTML = '총 거리: <b>'+fmtDistance(total)+'</b>'
            + '<br><span style="font-size:11px;color:#888">'+measurePoints.length+'개 지점</span>';
    } else if(measureMode === 'area' || measureLine instanceof L.Polygon){
        var area = polygonArea(measurePoints);
        var perimeter = 0;
        for(var i=0;i<measurePoints.length;i++){
            perimeter += haversine(measurePoints[i], measurePoints[(i+1)%measurePoints.length]);
        }
        resEl.innerHTML = '면적: <b>'+fmtArea(area)+'</b>'
            + '<br>둘레: '+fmtDistance(perimeter)
            + '<br><span style="font-size:11px;color:#888">'+measurePoints.length+'개 꼭짓점</span>';
    }
}

map.on('click', function(e){
    if(!measureMode) return;
    measurePoints.push(e.latlng);
    var dot = L.circleMarker(e.latlng, {
        radius: 5, color:'#fff', weight:2,
        fillColor:'#2563eb', fillOpacity:1
    }).addTo(map);
    measureMarkers.push(dot);
    if(measureLine){ map.removeLayer(measureLine); }
    if(measureMode === 'distance'){
        measureLine = L.polyline(measurePoints, {color:'#2563eb', weight:3, dashArray:'5 5'}).addTo(map);
    } else {
        if(measurePoints.length >= 2){
            measureLine = L.polygon(measurePoints, {
                color:'#2563eb', weight:2,
                fillColor:'#3b82f6', fillOpacity:0.2, dashArray:'5 5'
            }).addTo(map);
        }
    }
    updateMeasureDisplay();
});

map.on('dblclick', function(e){
    if(!measureMode) return;
    L.DomEvent.stopPropagation(e);
    if(measurePoints.length < (measureMode==='area'?3:2)) return;
    stopMeasure();
});

// ─────────────────────────────────────
// 8.6 공유 링크
// ─────────────────────────────────────
function buildShareUrl(){
    var c = map.getCenter();
    var z = map.getZoom();
    var params = new URLSearchParams();
    params.set('lat', c.lat.toFixed(6));
    params.set('lng', c.lng.toFixed(6));
    params.set('z', z);
    if(markers.length){
        var arr = markers.map(function(m){
            return [
                m.latlng.lat.toFixed(6),
                m.latlng.lng.toFixed(6),
                encodeURIComponent(m.title),
                encodeURIComponent(m.memo || ''),
                m.color.replace('#','')
            ].join('~');
        });
        params.set('m', arr.join('|'));
    }
    return location.origin + location.pathname + '?' + params.toString();
}

function showToast(msg){
    var t = document.getElementById('share-toast');
    t.textContent = msg;
    t.classList.add('visible');
    setTimeout(function(){ t.classList.remove('visible'); }, 2200);
}

async function copyShareLink(){
    var url = buildShareUrl();
    try {
        await navigator.clipboard.writeText(url);
        showToast('링크가 복사되었습니다');
    } catch(e) {
        var ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('링크가 복사되었습니다');
    }
}

function shareKakao(){
    var url = buildShareUrl();
    if(navigator.share){
        navigator.share({title:'PropMap 지도', text:'PropMap 지도 보기', url:url}).catch(function(){});
    } else {
        navigator.clipboard.writeText(url).then(function(){
            showToast('링크 복사됨 — 카카오톡에 붙여넣기');
        });
    }
}

(function restoreFromUrl(){
    var p = new URLSearchParams(location.search);
    if(p.has('lat') && p.has('lng')){
        map.setView([parseFloat(p.get('lat')), parseFloat(p.get('lng'))], parseInt(p.get('z') || '16'));
    }
    if(p.has('m')){
        p.get('m').split('|').forEach(function(s){
            var parts = s.split('~');
            if(parts.length < 5) return;
            var lat   = parseFloat(parts[0]);
            var lng   = parseFloat(parts[1]);
            var title = decodeURIComponent(parts[2]);
            var memo  = decodeURIComponent(parts[3]);
            var color = '#' + parts[4];
            var id    = Date.now() + Math.random();

            var leafletMarker = L.marker([lat,lng], {
                icon: L.divIcon({
                    html: makePinSvg(color, 30, 38),
                    className:'', iconSize:[30,38], iconAnchor:[15,38]
                })
            }).addTo(map);

            var popupHtml = '<div style="min-width:160px"><b style="font-size:13px;color:'+color+'">'+title+'</b>'
                + (memo ? '<p style="font-size:12px;margin:6px 0 0;color:#555">'+memo+'</p>' : '')
                + '<p style="font-size:10px;margin:6px 0 0;color:#aaa">'+lat.toFixed(6)+', '+lng.toFixed(6)+'</p></div>';
            leafletMarker.bindPopup(popupHtml);

            markers.push({id:id, title:title, memo:memo, color:color, latlng:L.latLng(lat,lng), leafletMarker:leafletMarker});
        });
        renderMarkerList();
    }
})();

// ─────────────────────────────────────
// 9. 유틸
// ─────────────────────────────────────
function showOverlay(msg,sub){
    document.getElementById('overlay-msg').textContent=msg;
    document.getElementById('overlay-sub').textContent=sub;
    document.getElementById('overlay-prog-bar').style.width='0%';
    document.getElementById('capture-overlay').classList.add('active');
}
function hideOverlay(){ document.getElementById('capture-overlay').classList.remove('active'); }
function updateProgress(done,total){
    var pct=Math.round(done/total*100);
    document.getElementById('overlay-prog-bar').style.width=pct+'%';
    document.getElementById('overlay-sub').textContent=done+' / '+total+' 타일 ('+pct+'%)';
}
function downloadCanvas(canvas,name,fmt,mime){
    var now=new Date();
    var ts=now.getFullYear()+('0'+(now.getMonth()+1)).slice(-2)+('0'+now.getDate()).slice(-2)
          +'_'+('0'+now.getHours()).slice(-2)+('0'+now.getMinutes()).slice(-2);
    var a=document.createElement('a');
    a.download=name+'_'+ts+'.'+fmt;
    a.href=canvas.toDataURL(mime,0.93);
    a.click();
}
